name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'website/**'
              - 'packages/**/src/**'
              - 'typedoc.json'
              - 'tsconfig.typedoc.json'
              - '.github/workflows/ci.yml'
            code:
              - 'packages/**'
              - 'apps/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'tsconfig.typedoc.json'
              - 'typedoc.json'
              - 'vitest.config.ts'
              - 'biome.json'
              - '.github/workflows/ci.yml'

  check:
    name: Biome Check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm check

  test:
    name: Test, Lint & Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: pnpm lint

      - name: Test with coverage
        if: matrix.node-version == 22
        run: pnpm test:coverage

      - name: Test
        if: matrix.node-version != 22
        run: pnpm test

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm build

      - name: Run examples
        if: matrix.node-version == 22
        run: pnpm --filter @hrkit/examples quickstart

      - name: Check bundle size
        if: matrix.node-version == 22
        run: pnpm size

  docs:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus site
        run: |
          pnpm sync:versions:check
          pnpm docs:api
          pnpm docs:packages:check
          pnpm --filter website build

  ci-success:
    name: CI Success
    if: always()
    needs: [changes, check, test, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          # Skipped jobs (due to path filter) count as success.
          # Only fail if a required job genuinely failed or was cancelled.
          for result in "${{ needs.check.result }}" "${{ needs.test.result }}" "${{ needs.docs.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A required job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All required jobs passed (or were skipped by path filter)."
