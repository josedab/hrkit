version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsup"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "docusaurus*"
          - "prism-react-renderer"
    commit-message:
      prefix: chore(docs)
      include: scope
    labels:
      - dependencies
      - documentation

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
