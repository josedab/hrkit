<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- HR waveform -->
  <polyline points="50,350 150,350 200,250 280,450 360,300 420,370 480,350 600,350"
    fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <polyline points="600,350 700,350 750,250 830,450 910,300 970,370 1030,350 1150,350"
    fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>

  <!-- Logo -->
  <rect x="50" y="60" width="64" height="64" rx="14" fill="#e63946"/>
  <polyline points="58,94 68,94 72,80 78,108 84,86 88,98 92,94 106,94"
    fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="130" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">@hrkit</text>

  <!-- Tagline -->
  <text x="50" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#ffffff" opacity="0.9">BLE Heart Rate SDK for TypeScript</text>

  <!-- Subtitle -->
  <text x="50" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#ffffff" opacity="0.6">Any device. Any platform. Zero dependencies.</text>

  <!-- Feature pills -->
  <rect x="50" y="290" width="120" height="36" rx="18" fill="#e63946" opacity="0.2"/>
  <text x="110" y="313" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">HRV Metrics</text>

  <rect x="185" y="290" width="90" height="36" rx="18" fill="#e63946" opacity="0.2"/>
  <text x="230" y="313" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">TRIMP</text>

  <rect x="290" y="290" width="100" height="36" rx="18" fill="#e63946" opacity="0.2"/>
  <text x="340" y="313" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">HR Zones</text>

  <rect x="405" y="290" width="140" height="36" rx="18" fill="#e63946" opacity="0.2"/>
  <text x="475" y="313" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">Workout Engine</text>

  <rect x="560" y="290" width="120" height="36" rx="18" fill="#e63946" opacity="0.2"/>
  <text x="620" y="313" font-family="system-ui, sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">VO₂max Est.</text>

  <!-- URL -->
  <text x="50" y="580" font-family="system-ui, sans-serif" font-size="20" fill="#ffffff" opacity="0.4">hrkit.dev</text>
  <text x="1150" y="580" font-family="system-ui, sans-serif" font-size="20" fill="#ffffff" opacity="0.4" text-anchor="end">github.com/josedab/hrkit</text>
</svg>
