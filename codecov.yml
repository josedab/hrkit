coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "packages/*/dist/**"
  - "**/*.test.ts"
  - "**/__tests__/**"
  - "apps/**"
  - "website/**"
  - "examples/**"
  - "scripts/**"
