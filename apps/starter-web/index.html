<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@hrkit Web Bluetooth starter</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      body { margin: 0; padding: 2rem; max-width: 720px; margin-inline: auto; color: #1a1a1a; background: #fafafa; }
      h1 { margin-top: 0; }
      button { padding: 0.6rem 1.2rem; font-size: 1rem; border: 1px solid #1a1a1a; background: #1a1a1a; color: #fff; border-radius: 6px; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .row { display: flex; gap: 0.75rem; margin: 1rem 0; flex-wrap: wrap; }
      pre { background: #fff; border: 1px solid #e5e5e5; padding: 1rem; border-radius: 6px; max-height: 240px; overflow: auto; font-size: 0.85rem; }
      .warning { background: #fff8e1; border: 1px solid #f9a825; color: #8d6e00; padding: 0.75rem 1rem; border-radius: 6px; margin: 1rem 0; }
    </style>
  </head>
  <body>
    <h1>@hrkit Web Bluetooth starter</h1>
    <p>Scans for a BLE Heart Rate sensor, connects, and streams HR + RR intervals via <code>@hrkit/web</code>.</p>

    <div id="unsupported" class="warning" hidden>
      Web Bluetooth is not available in this browser. Use Chrome, Edge, or another Chromium-based browser over HTTPS (or <code>localhost</code>).
    </div>

    <div class="row">
      <button id="connect">Connect HR sensor</button>
      <button id="disconnect" disabled>Disconnect</button>
    </div>

    <h2>Live</h2>
    <hrkit-hr-display id="display"></hrkit-hr-display>
    <hrkit-hr-chart id="chart" max-samples="120"></hrkit-hr-chart>

    <h2>Log</h2>
    <pre id="log">Click "Connect HR sensor" to start.</pre>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
